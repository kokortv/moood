<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
	<title>Настроение</title>
	<link rel="manifest" href="./manifest.json">
	<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%237c6aff'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E😊%3C/text%3E%3C/svg%3E">
	<meta name="theme-color" content="#7c6aff">
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Nunito:wght@400;500;600&display=swap');
		* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
		:root { --bg: #0e0e14; --surface: #16161f; --surface2: #1e1e2a; --border: rgba(255,255,255,0.07); --text: #f0f0f8; --muted: rgba(240,240,248,0.4); --accent: #7c6aff; --accent2: #ff6a9e; }
		body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; justify-content: center; padding: 0 0 40px; overflow-x: hidden; }
		.noise { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20256%20256%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cfilter%20id%3D%22noise%22%3E%3CfeTurbulence%20type%3D%22fractalNoise%22%20baseFrequency%3D%220.9%22%20numOctaves%3D%224%22%20stitchTiles%3D%22stitch%22%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20filter%3D%22url%28%2523noise%29%22%20opacity%3D%220.04%22%2F%3E%3C%2Fsvg%3E"); opacity: 0.4; }
		.glow-orb { position: fixed; pointer-events: none; border-radius: 50%; filter: blur(90px); z-index: 0; animation: orbDrift 12s ease-in-out infinite alternate; }
		.orb1 { width: 380px; height: 380px; background: rgba(124,106,255,0.15); top: -120px; right: -100px; transition: background 1.2s ease; animation-delay: 0s; }
		.orb2 { width: 300px; height: 300px; background: rgba(255,106,158,0.1); bottom: 80px; left: -80px; transition: background 1.2s ease; animation-delay: -6s; }
		@keyframes orbDrift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(20px, 30px) scale(1.08); } }
		.app { width: 100%; max-width: 420px; padding: 28px 20px; position: relative; z-index: 1; }
		header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
		.greeting { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
		.greeting span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
		.header-actions { display: flex; gap: 12px; align-items: center; }
		.cloud-icon { background: var(--surface2); border: 1px solid var(--border); border-radius: 30px; padding: 6px 12px; font-size: 18px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s; line-height: 1; }
		.cloud-icon:hover { border-color: var(--accent); background: rgba(124,106,255,0.2); transform: scale(1.12) rotate(-5deg); }
		.cloud-icon:active { transform: scale(0.92); }
		.net-badge { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px; background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.25); display: flex; align-items: center; gap: 5px; }
		.net-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
		.net-badge.offline { background: rgba(255,165,0,0.15); color: #ffa500; border-color: rgba(255,165,0,0.25); }
		.net-badge.offline::before { background: #ffa500; animation: none; }
		@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
		.date-line { text-align: center; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px; }
		.carousel-wrap { background: var(--surface); border-radius: 28px; border: 1px solid var(--border); padding: 32px 20px 28px; margin-bottom: 16px; position: relative; overflow: hidden; }
		.carousel-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(124,106,255,0.6), transparent); }
		.carousel-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,106,158,0.3), transparent); }
		.mood-label { text-align: center; font-family: 'Unbounded', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
		.emoji-track-wrap { position: relative; height: 120px; overflow: hidden; touch-action: pan-y; }
		.emoji-track { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.34, 1.5, 0.64, 1); will-change: transform; }
		.emoji-slide { flex: 0 0 100%; display: flex; justify-content: center; align-items: center; }
		.emoji-slide .em { font-size: 92px; filter: drop-shadow(0 0 24px rgba(124,106,255,0.45)); cursor: default; }
		@keyframes emojiPop { 0% { transform: scale(0.4) rotate(-10deg); opacity: 0; } 60% { transform: scale(1.15) rotate(4deg); opacity: 1; } 80% { transform: scale(0.95) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
		@keyframes emojiBreathe { 0%,100% { filter: drop-shadow(0 0 18px rgba(124,106,255,0.4)) drop-shadow(0 4px 12px rgba(0,0,0,0.3)); transform: scale(1) translateY(0); } 50% { filter: drop-shadow(0 0 36px rgba(124,106,255,0.75)) drop-shadow(0 8px 20px rgba(0,0,0,0.2)); transform: scale(1.05) translateY(-4px); } }
		.emoji-slide.active .em { animation: emojiPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both, emojiBreathe 3.2s ease-in-out 0.5s infinite; }
		@keyframes navBounce { 0% { transform: scale(1); } 30% { transform: scale(0.82); } 60% { transform: scale(1.12); } 80% { transform: scale(0.97); } 100% { transform: scale(1); } }
		.nav-btn.bounce { animation: navBounce 0.38s cubic-bezier(0.34,1.56,0.64,1); }
		.dots { display: flex; justify-content: center; gap: 6px; margin-top: 20px; }
		.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); cursor: pointer; }
		.dot.active { width: 22px; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
		.dot:hover:not(.active) { background: rgba(124,106,255,0.4); transform: scale(1.3); }
		.carousel-nav { display: flex; justify-content: space-between; margin-top: 16px; }
		.nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 44px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, color 0.2s, background 0.2s; font-size: 18px; }
		.nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,0.08); }
		.mood-name { flex: 1; text-align: center; font-family: 'Unbounded', sans-serif; font-size: 13px; line-height: 44px; transition: opacity 0.15s; }
		textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); resize: none; transition: border-color 0.2s, box-shadow 0.2s; }
		textarea:focus { outline: none; border-color: rgba(124,106,255,0.55); box-shadow: 0 0 0 3px rgba(124,106,255,0.1); }
		.save-btn { width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #a06aff 50%, var(--accent2) 100%); background-size: 200% 200%; animation: gradShift 4s ease infinite; color: white; border: none; border-radius: 18px; padding: 17px; font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 24px rgba(124,106,255,0.35); transition: box-shadow 0.2s, transform 0.15s; position: relative; overflow: hidden; }
		.save-btn:hover { box-shadow: 0 6px 32px rgba(124,106,255,0.55); transform: translateY(-2px); }
		.save-btn:active { transform: scale(0.97); }
		.save-btn:disabled { opacity: 0.5; animation: none; background: var(--surface2); transform: none !important; }
		@keyframes gradShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
		@keyframes savePulse { 0% { box-shadow: 0 4px 24px rgba(124,106,255,0.35); } 40% { box-shadow: 0 0 0 14px rgba(124,106,255,0), 0 4px 40px rgba(124,106,255,0.7); } 100% { box-shadow: 0 4px 24px rgba(124,106,255,0.35); } }
		.save-btn.did-save { animation: savePulse 0.65s ease-out !important; }
		@keyframes emojiLaunch { 0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; } 100% { transform: scale(2) translateY(-80px) rotate(15deg); opacity: 0; } }
		.emoji-launching .em { animation: emojiLaunch 0.5s cubic-bezier(0.2, 0, 0.4, 1) forwards !important; }
		.confetti-particle { position: fixed; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; z-index: 9999; animation: confettiFall var(--dur,1s) var(--delay,0s) cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
		@keyframes confettiFall { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; } 60% { opacity: 1; } 100% { transform: translate(var(--tx,0px), var(--ty,120px)) rotate(var(--rot,360deg)) scale(0.3); opacity: 0; } }
		.history-header { display: flex; justify-content: space-between; align-items: center; margin: 32px 0 16px; }
		.history-title { font-family: 'Unbounded', sans-serif; font-size: 13px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
		.history-count { font-size: 11px; color: var(--accent); background: rgba(124,106,255,0.12); padding: 3px 9px; border-radius: 10px; font-weight: 600; }
		.history-list { display: flex; flex-direction: column; gap: 10px; }
		@keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.96); } 65% { transform: translateY(-3px) scale(1.01); } to { opacity: 1; transform: translateY(0) scale(1); } }
		.history-item { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--item-accent, var(--accent)); border-radius: 18px; padding: 14px 16px; animation: cardIn 0.4s cubic-bezier(0.34,1.2,0.64,1) both; transition: transform 0.18s, box-shadow 0.18s; }
		.history-item:hover { transform: translateX(3px); box-shadow: -4px 0 20px rgba(124,106,255,0.1); }
		.h-emoji { font-size: 34px; width: 52px; height: 52px; background: var(--surface2); border-radius: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; }
		.history-item:hover .h-emoji { transform: scale(1.12) rotate(-6deg); }
		.h-content { flex: 1; min-width: 0; }
		.h-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
		.h-comment { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.h-comment.empty { color: var(--muted); font-style: italic; }
		.edit-icon, .delete-icon { background: var(--surface2); border-radius: 10px; padding: 5px; cursor: pointer; font-size: 14px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; }
		.edit-icon:hover { background: var(--accent); transform: scale(1.18) rotate(-8deg); }
		.delete-icon:hover { background: #ff4d4d; transform: scale(1.18) rotate(8deg); }
		.h-offline { font-size: 10px; color: #ffa500; background: rgba(255,165,0,0.1); padding: 3px 7px; border-radius: 8px; }
		.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
		.es-emoji { font-size: 40px; margin-bottom: 12px; }
		.loc-pill { background: rgba(124,106,255,0.12); border: 1px solid rgba(124,106,255,0.25); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--accent); display: inline-flex; align-items: center; gap: 6px; animation: fadeSlideIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both; }
		@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-8px) scale(0.94); } to { opacity: 1; transform: translateY(0) scale(1); } }
		.loc-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; transition: color 0.15s, transform 0.2s; }
		.loc-clear:hover { color: var(--accent2); transform: scale(1.2); }
		.h-loc { font-size: 11px; color: var(--muted); margin-top: 3px; }
		.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(90px) scale(0.9); background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px 22px; transition: transform 0.45s cubic-bezier(0.34,1.4,0.64,1), opacity 0.3s; z-index: 9000; pointer-events: none; font-size: 14px; font-weight: 600; opacity: 0; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
		.toast.show { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
		.streak-card { background: var(--surface); border: 1px solid rgba(255,159,67,0.2); border-radius: 20px; padding: 14px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
		.streak-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,159,67,0.06), transparent); pointer-events: none; }
		.streak-icon { font-size: 28px; animation: fireWiggle 1.4s ease-in-out infinite; transform-origin: bottom center; }
		@keyframes fireWiggle { 0%,100% { transform: rotate(-8deg) scale(1); } 25% { transform: rotate(8deg) scale(1.1); } 50% { transform: rotate(-4deg) scale(1.05); } 75% { transform: rotate(6deg) scale(1.1); } }
		.streak-num { font-family: 'Unbounded', sans-serif; font-size: 24px; background: linear-gradient(135deg, #ff9f43, #ff6a9e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
		.streak-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
		.loc-row { margin-bottom: 14px; min-height: 36px; }
		.modal-cloud { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s; pointer-events: none; }
		.modal-cloud.active { visibility: visible; opacity: 1; pointer-events: all; }
		#cloudModal { background: var(--bg); }
		#cloudModal .cloud-modal-content { position: absolute; inset: 0; }
		.cloud-header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 52px 24px 20px; display: flex; justify-content: space-between; align-items: flex-start; background: linear-gradient(to bottom, var(--bg) 60%, transparent); pointer-events: none; }
		.cloud-title { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 600; }
		.cloud-title span { font-size: 11px; display: block; color: var(--muted); font-weight: 400; letter-spacing: 1px; margin-top: 4px; text-transform: uppercase; }
		.cloud-close-btn { position: relative; background: var(--surface2); border: 1px solid var(--border); color: white; font-size: 18px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; pointer-events: all; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
		.cloud-close { position: absolute; top: 16px; right: 20px; background: var(--surface2); border: 1px solid var(--border); color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; pointer-events: all; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
		.cloud-close:hover { background: rgba(255,77,77,0.3); transform: scale(1.12) rotate(90deg); }
		.cloud-canvas { position: absolute; inset: 0; overflow: hidden; }
		.floating-emoji { position: absolute; user-select: none; pointer-events: none; will-change: transform; transition: none; }
	</style>
</head>
<body>
<div class="noise"></div>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="app">
	<header>
		<div class="greeting">Привет, <span id="user-name">...</span> 👋</div>
		<div class="header-actions">
			<div id="cloudBtn" class="cloud-icon">☁️</div>
			<div id="net-badge" class="net-badge">Online</div>
		</div>
	</header>

	<div class="date-line" id="today-date"></div>

	<div class="streak-card" id="streak-card" style="display:none">
		<div class="streak-icon">🔥</div>
		<div><div class="streak-num" id="streak-num">0</div><div class="streak-text">дней подряд</div></div>
	</div>

	<div class="carousel-wrap">
		<div class="mood-label">Как ты сейчас?</div>
		<div class="emoji-track-wrap" id="track-wrap">
			<div class="emoji-track" id="emoji-track"></div>
		</div>
		<div class="dots" id="dots"></div>
		<div class="carousel-nav">
			<button class="nav-btn" id="prevBtn">←</button>
			<div class="mood-name" id="mood-name"></div>
			<button class="nav-btn" id="nextBtn">→</button>
		</div>
	</div>

	<div class="input-wrap">
		<textarea id="comment" rows="3" placeholder="Что происходит? Можно не писать..."></textarea>
	</div>
	<div class="loc-row" id="loc-row"></div>
	<button class="save-btn" id="save-btn">Зафиксировать момент</button>

	<div class="history-header">
		<div class="history-title">История</div>
		<div class="history-count" id="hist-count">0</div>
	</div>
	<div class="history-list" id="history-list">
		<div class="empty-state"><div class="es-emoji">🌙</div>Загрузка...</div>
	</div>
</div>

<div class="toast" id="toast"></div>

<!-- Модалка редактирования -->
<div id="editModal" class="modal-cloud" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(0);">
	<div class="cloud-modal-content" style="height: auto; width: 280px; border-radius: 24px; padding: 20px;">
		<h3 style="margin-bottom: 10px;">✏️ Редактировать</h3>
		<textarea id="editComment" rows="3" placeholder="Новый комментарий..." style="width:100%"></textarea>
		<div style="display: flex; gap: 12px; margin-top: 15px;">
			<button id="saveEditBtn" style="background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 30px;">Сохранить</button>
			<button id="cancelEditBtn" style="background: var(--surface); color: var(--muted); border: none; padding: 8px 20px; border-radius: 30px;">Отмена</button>
		</div>
	</div>
</div>

<!-- Модалка облака настроений -->
<div id="cloudModal" class="modal-cloud">
	<div class="cloud-modal-content">
		<div class="cloud-header">
			<div class="cloud-title">Эмоции месяца<span id="cloud-subtitle" style="font-size:11px;display:block;color:var(--muted);font-weight:400;letter-spacing:1px;margin-top:4px;text-transform:uppercase">последние 30 дней</span></div>
			<button class="cloud-close" id="closeCloudBtn">✕</button>
		</div>
		<div id="cloudCanvas" class="cloud-canvas"></div>
	</div>
</div>

<script>
	var API_URL = 'https://script.google.com/macros/s/AKfycbzJSXqYu7KW5euWznmHEtU41mIQ2poHNcTaYjBiM1chp-nJA0G_vYcg1uNxvs8Ih3J4zg/exec';

	function apiGet(action) {
		return fetch(API_URL + '?action=' + action)
			.then(function(r) {
				return r.text().then(function(text) {
					try { return JSON.parse(text); }
					catch(e) { console.error('JSON parse error:', e); return null; }
				});
			})
			.catch(function(err) { console.log('Fetch error:', err); return null; });
	}

	function apiPost(body) {
		return fetch(API_URL, {
			method: 'POST',
			headers: { 'Content-Type': 'text/plain' },
			body: JSON.stringify(body)
		})
			.then(function(r) { return r.json(); })
			.catch(function() { return null; });
	}

	(function() {
		// ========== MOODS ==========
		var MOODS = [
			{ emoji: '😰', name: 'Тревога' }, { emoji: '😬', name: 'Напряжение' },
			{ emoji: '🤢', name: 'Мутит' }, { emoji: '😵', name: 'Головокружение' },
			{ emoji: '😐', name: 'Нейтрально' }, { emoji: '😌', name: 'Спокойно' },
			{ emoji: '😊', name: 'Хорошо' }, { emoji: '🤩', name: 'Отлично' },
			{ emoji: '🥴', name: 'Пьяный' }, { emoji: '🤤', name: 'Голоден' },
			{ emoji: '🫠', name: 'Устал' }, { emoji: '😴', name: 'Сонный' },
			{ emoji: '😤', name: 'Раздражение' }
		];

		var savedMood = localStorage.getItem('lastMoodIndex');
		var cur = 3;
		if (savedMood !== null && !isNaN(parseInt(savedMood))) {
			var idx = parseInt(savedMood);
			if (idx >= 0 && idx < MOODS.length) cur = idx;
		}

		var startX = null;

		function spawnConfetti(originEl) {
			var rect = originEl.getBoundingClientRect();
			var cx = rect.left + rect.width / 2;
			var cy = rect.top + rect.height / 2;
			var colors = ['#7c6aff','#ff6a9e','#a06aff','#ffce54','#2ecc71','#ff9f43','#00d2d3'];
			for (var i = 0; i < 28; i++) {
				var p = document.createElement('div');
				p.className = 'confetti-particle';
				var angle = (Math.random() * 360) * (Math.PI / 180);
				var speed = 60 + Math.random() * 100;
				var tx = Math.cos(angle) * speed;
				var ty = Math.sin(angle) * speed - 40;
				var rot = (Math.random() - 0.5) * 720;
				var dur = 0.6 + Math.random() * 0.5;
				var delay = Math.random() * 0.15;
				p.style.cssText = [
					'left:' + (cx - 4) + 'px',
					'top:' + (cy - 4) + 'px',
					'background:' + colors[Math.floor(Math.random() * colors.length)],
					'--tx:' + tx + 'px',
					'--ty:' + ty + 'px',
					'--rot:' + rot + 'deg',
					'--dur:' + dur + 's',
					'--delay:' + delay + 's',
					'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px')
				].join(';');
				document.body.appendChild(p);
				setTimeout(function(el) { el.remove(); }, (dur + delay + 0.1) * 1000, p);
			}
		}
		function escapeHtml(str) {
			if (!str) return '';
			return String(str).replace(/[&<>]/g, function(m) {
				if (m === '&') return '&amp;';
				if (m === '<') return '&lt;';
				if (m === '>') return '&gt;';
				return m;
			});
		}
		function normalizeDate(str) {
			// "28.04.2026, 12:11" → "28.04.2026 12:11"
			if (typeof str !== 'string') return str;
			return str.replace(',', '').replace(/\s+/, ' ').trim();
		}

				var dot = document.createElement('div');

				dot.addEventListener('click', (function(idx) { return function() { go(idx - cur); }; })(i));
				dotsEl.appendChild(dot);
			}
			updateCarousel(false);

		function updateCarousel(animate) {
			if (animate === false) track.style.transition = 'none';

			}

		function renderHistoryItems() {

			var offlineQueue = JSON.parse(localStorage.getItem('moodQueue') || '[]');

				addToUI(offlineQueue[i], true, null);

			var visible = fullHistory.slice(0, currentLimit);
			for (var i = 0; i < visible.length; i++) {
				var row = visible[i];
				addToUI({
					date: row[1],
					emoji: row[2],
					comment: row[3] || '',

				}, false, row[0]);
			}

				histList.innerHTML = '<div class="empty-state"><div class="es-emoji">🌱</div>Пока пусто — сделай первую запись!</div>';

							loadMoreBtn = null;
						}
					});

		function deleteEntryById(id, rowElement) {
			if (!navigator.onLine) { showToast('Нет интернета, удаление доступно только онлайн'); return; }
			if (!confirm('Удалить запись?')) return;

		// ========== SAVE & OFFLINE QUEUE ==========
		function saveCommentDraft() { if (commentField) localStorage.setItem('commentDraft', commentField.value); }
		function restoreCommentDraft() { if (commentField) { var draft = localStorage.getItem('commentDraft'); if (draft) commentField.value = draft; } }

		function saveEntryAction() {

			var comment = commentField ? commentField.value.trim() : '';
			var date = new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

						q.push(entry);
						localStorage.setItem('moodQueue', JSON.stringify(q));
						addNewEntryToTop(entry, true, null);
						updateStreak();
					});
			} else {
				var q = JSON.parse(localStorage.getItem('moodQueue') || '[]');
				q.push(entry);
				localStorage.setItem('moodQueue', JSON.stringify(q));
				saveBtn.disabled = false;
				saveBtn.textContent = 'Зафиксировать момент';
				showToast('💾 Сохранено локально');
				addNewEntryToTop(entry, true, null);

		function syncOffline() {
			if (!navigator.onLine) return;
			var queue = JSON.parse(localStorage.getItem('moodQueue') || '[]');
			if (!queue.length) return;
			netBadge.textContent = 'Синхр...';
			var entry = queue[0];
			apiPost({ action: 'save', emoji: entry.emoji, comment: entry.comment, date: entry.date, location: entry.location || '' })
				.then(function(res) {
					if (res && res.success) {
						queue.shift();
						localStorage.setItem('moodQueue', JSON.stringify(queue));
						addNewEntryToTop(entry, false, res.id);
						syncOffline();
					} else {
						netBadge.textContent = 'Online';
						netBadge.className = 'net-badge';
					}
				})
				.catch(function() {
					netBadge.textContent = 'Online';
					netBadge.className = 'net-badge';
				});
		}

		// ========== STREAK ==========
		function updateStreak() {
			try {
				var today = new Date().toDateString();
				var days = JSON.parse(localStorage.getItem('moodDays') || '[]');
				if (days.indexOf(today) === -1) {
					days.push(today);
					localStorage.setItem('moodDays', JSON.stringify(days));
				}
				var streak = 0;
				var d = new Date();
				while (days.indexOf(d.toDateString()) !== -1) { streak++; d.setDate(d.getDate() - 1); }
				var card = document.getElementById('streak-card');
				var num = document.getElementById('streak-num');
				if (streak > 1) {
					if (card) card.style.display = 'flex';
					if (num) num.textContent = streak;
				} else {
					if (card) card.style.display = 'none';
				}
			} catch(e) {}
		}

		// ========== EMOTION CLOUD ==========
		function openCloudModal() {
			if (!allHistoryData || allHistoryData.length === 0) { showToast('Нет данных за последние 30 дней'); return; }
			if (!cloudCanvas) return;
			cloudCanvas.innerHTML = '';
			var freq = {};
			var now = new Date();
			var monthAgo = new Date(now.getTime() - 30 * 24 * 3600 * 1000);
			for (var i = 0; i < allHistoryData.length; i++) {
				var row = allHistoryData[i];
				var dateStr = normalizeDate(row[1]); // ← единый нормализатор, без дублирующегося var
				var parts = dateStr.split(' ');
				if (!parts[0]) continue;
				var dayParts = parts[0].split('.');
				if (dayParts.length < 3) continue;
				var itemDate = new Date(dayParts[2], dayParts[1] - 1, dayParts[0]);
				if (isNaN(itemDate.getTime())) continue; // ← пропускаем невалидные даты
				if (itemDate >= monthAgo) {
					var em = row[2];
					freq[em] = (freq[em] || 0) + 1;
				}
			}
			var maxCount = 0;
			for (var e in freq) if (freq[e] > maxCount) maxCount = freq[e];
			if (maxCount === 0) {
				cloudCanvas.innerHTML = '<div class="empty-state" style="margin-top:50%">Нет записей за 30 дней</div>';
				cloudModal.classList.add('active');
				return;
			}
			var totalCount = 0; for (var ek in freq) totalCount += freq[ek];
			var sub = document.getElementById('cloud-subtitle');
			if (sub) { var w=totalCount%10,h=totalCount%100; sub.textContent=totalCount+' '+(w===1&&h!==11?'запись':w>=2&&w<=4&&(h<10||h>=20)?'записи':'записей')+' за 30 дней'; }
			document.body.style.overflow = 'hidden';
			cloudModal.classList.add('active');
			var width = window.innerWidth;
			var height = window.innerHeight;
			var emojis = Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];});
			var padding = 20;
			var topPad = 110;
			var placed = [];
			function overlaps(cx, cy, r) {
				for (var p = 0; p < placed.length; p++) {
					var dx = cx - placed[p].cx, dy = cy - placed[p].cy;
					if (Math.sqrt(dx*dx+dy*dy) < r + placed[p].r + 6) return true;
				}
				return false;
			}
			for (var i = 0; i < emojis.length; i++) {
				var em = emojis[i];
				var count = freq[em];
				var ratio = count / maxCount;
				var size = Math.round(30 + Math.sqrt(ratio) * 78);
				var r = size * 0.55;
				var opacity = 0.35 + ratio * 0.65;
				var blur = Math.round((1 - ratio) * 2.5 * 10) / 10;
				var cx, cy, found = false;
				var cx0 = width / 2, cy0 = topPad + (height - topPad) / 2;
				for (var attempt = 0; attempt < 300; attempt++) {
					var angle = attempt * 2.4;
					var rad = (attempt / 300) * Math.min(width, height - topPad) * 0.46;
					cx = cx0 + rad * Math.cos(angle);
					cy = cy0 + rad * Math.sin(angle);
					if (cx - r < padding || cx + r > width - padding) continue;
					if (cy - r < topPad || cy + r > height - padding) continue;
					if (!overlaps(cx, cy, r)) { found = true; break; }
				}
				if (!found) continue;
				placed.push({cx: cx, cy: cy, r: r});
				var div = document.createElement('div');
				div.className = 'floating-emoji';
				div.textContent = em;
				div.style.fontSize = size + 'px';
				div.style.opacity = opacity;
				div.style.filter = blur > 0 ? 'blur(' + blur + 'px)' : 'none';
				div.style.left = Math.round(cx - r) + 'px';
				div.style.top = Math.round(cy - r) + 'px';
				div.style.lineHeight = '1';
				var dx1 = (Math.random()-0.5)*28, dy1 = (Math.random()-0.5)*28;
				var dx2 = (Math.random()-0.5)*22, dy2 = (Math.random()-0.5)*22;
				var rot = (Math.random()-0.5)*14;
				var keyName = 'fl' + i;
				var styleEl = document.createElement('style');
				styleEl.textContent = '@keyframes ' + keyName + '{' +
					'0%{transform:translate(0,0) rotate(0deg)}' +
					'33%{transform:translate(' + dx1 + 'px,' + dy1 + 'px) rotate(' + rot + 'deg)}' +
					'66%{transform:translate(' + dx2 + 'px,' + dy2 + 'px) rotate(' + (-rot*0.6) + 'deg)}' +
					'100%{transform:translate(0,0) rotate(0deg)}}';
				document.head.appendChild(styleEl);
				var duration = 7 + Math.random() * 10;
				var delay = Math.random() * 6;
				div.style.animation = keyName + ' ' + duration + 's ' + delay + 's ease-in-out infinite';
				cloudCanvas.appendChild(div);
			}
		}
		function closeCloudModal() { cloudModal.classList.remove('active'); cloudCanvas.innerHTML = ''; document.body.style.overflow = ''; }
		cloudBtn.addEventListener('click', openCloudModal);
		closeCloudBtn.addEventListener('click', closeCloudModal);
		cloudModal.addEventListener('click', function(e) { if (e.target === cloudModal) closeCloudModal(); });

		// ========== ESCAPE KEY ==========
		document.addEventListener('keydown', function(e) {
			if (e.key === 'Escape') {
				if (cloudModal.classList.contains('active')) closeCloudModal();
				if (editModalEl.classList.contains('active')) closeEditModal();
			}
		});

		// ========== TEXTAREA AUTO-RESIZE ==========
		if (commentField) {
			commentField.addEventListener('input', function() {
				this.style.height = 'auto';
				this.style.height = Math.min(this.scrollHeight, 160) + 'px';
			});
		}

		// ========== LOAD SERVER DATA ==========
		function loadServerData() {
			if (!navigator.onLine) {
				if (userNameSpan) userNameSpan.textContent = 'друг';
				renderHistoryItems();
				return;
			}
			var timeout = setTimeout(function() {
				if (userNameSpan) userNameSpan.textContent = 'друг';
				renderHistoryItems();
				showToast('Не удалось загрузить данные с сервера');
			}, 3000);
			apiGet('getData')
				.then(function(data) {
					clearTimeout(timeout);
					if (!data) throw new Error('no data');
					if (userNameSpan) userNameSpan.textContent = data.name || 'друг';
					setFullHistory(data.history || []);
					syncOffline();
				})
				.catch(function() {
					clearTimeout(timeout);
					if (userNameSpan) userNameSpan.textContent = 'друг';
					setFullHistory([]);
					showToast('Не удалось загрузить данные');
				});
		}

		// ========== SERVICE WORKER ==========
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('./sw.js').catch(function(e) { console.log('SW:', e); });
		}

		// ========== START ==========
		buildCarousel();
		updateOrbs();
		updateStreak();
		autoDetectLocation();
		loadServerData();
	})();
</script>
</body>
</html>
